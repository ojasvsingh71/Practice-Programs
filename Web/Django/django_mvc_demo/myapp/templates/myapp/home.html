<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Django MVC Demo</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f4f7fb;
        margin: 0;
        padding: 40px;
      }
      .card {
        max-width: 560px;
        margin: 0 auto;
        background: #fff;
        border-radius: 14px;
        padding: 28px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      }
      h1 {
        margin-top: 0;
      }
      label {
        display: block;
        margin: 16px 0 6px;
        font-weight: 600;
      }
      input {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        box-sizing: border-box;
      }
      button {
        margin-top: 20px;
        background: #2563eb;
        color: white;
        border: 0;
        border-radius: 8px;
        padding: 12px 16px;
        cursor: pointer;
      }
      .note {
        color: #475569;
        margin-bottom: 20px;
      }
      .errors {
        color: #b91c1c;
        margin: 10px 0 0;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Django MVC Demo</h1>
      <p class="note">
        This page uses a Django form, view, URL route, and template to collect
        input.
      </p>
      <form method="post" action="{% url 'submit_form' %}">
        {% csrf_token %} {{ form.non_field_errors }}
        <label for="id_name">Name</label>
        {{ form.name }}
        <div class="errors">{{ form.name.errors }}</div>

        <label for="id_email">Email</label>
        {{ form.email }}
        <div class="errors">{{ form.email.errors }}</div>

        <label for="id_course">Course</label>
        {{ form.course }}
        <div class="errors">{{ form.course.errors }}</div>

        <button type="submit">Submit</button>
      </form>
    </div>
  </body>
</html>
