<!doctype html>
<html>
  <head>
    <title>Power Bill System</title>

    <style>
      body {
        font-family: Arial;
        background-color: #f2f2f2;
        padding: 30px;
      }

      .container {
        width: 500px;
        background: white;
        margin: auto;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0px 0px 10px gray;
      }

      input {
        width: 95%;
        padding: 10px;
        margin: 8px 0;
      }

      button {
        background-color: darkgreen;
        color: white;
        border: none;
        padding: 10px 20px;
        cursor: pointer;
      }

      .bill-box {
        background-color: #f9f9f9;
        padding: 15px;
        border-radius: 8px;
      }

      h2,
      h3 {
        text-align: center;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h2>Electricity Bill Calculator</h2>

      {% if success %}

      <div class="bill-box">
        <h3>Bill Summary</h3>

        <p><b>Customer Name:</b> {{ customer_name }}</p>
        <p><b>Consumer ID:</b> {{ consumer_id }}</p>
        <p><b>Units Consumed:</b> {{ units }}</p>

        <hr />

        <h3>Total Bill Amount: ₹{{ amount }}</h3>

        <br />

        <a href="/">Calculate Another Bill</a>
      </div>

      {% else %}

      <form action="/bill" method="POST">
        <label>Customer Name</label>
        <input type="text" name="customer_name" required />

        <label>Consumer ID</label>
        <input type="text" name="consumer_id" required />

        <label>Units Consumed</label>
        <input type="text" name="units" required />

        <br /><br />

        <button type="submit">Generate Bill</button>
      </form>

      {% endif %}
    </div>
  </body>
</html>
