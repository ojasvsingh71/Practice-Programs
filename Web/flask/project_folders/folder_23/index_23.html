<!doctype html>
<html>
  <head>
    <title>Taxi Fare Portal</title>

    <style>
      body {
        font-family: Arial;
        background-color: #f2f2f2;
        padding: 30px;
      }

      .container {
        width: 500px;
        background: white;
        margin: auto;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0px 0px 10px gray;
      }

      input {
        width: 95%;
        padding: 10px;
        margin: 8px 0;
      }

      button {
        background-color: darkblue;
        color: white;
        border: none;
        padding: 10px 20px;
        cursor: pointer;
      }

      .receipt-box {
        background-color: #f9f9f9;
        padding: 15px;
        border-radius: 8px;
      }

      h2,
      h3 {
        text-align: center;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h2>Cab Fare Calculator</h2>

      {% if success %}

      <div class="receipt-box">
        <h3>Taxi Fare Receipt</h3>

        <p><b>Customer Name:</b> {{ customer_name }}</p>

        <hr />

        <p><b>Distance Travelled:</b> {{ distance }} KM</p>
        <p><b>Fare per KM:</b> ₹{{ fare_per_km }}</p>

        <hr />

        <h3>Total Cab Fare: ₹{{ total_fare }}</h3>

        <br />

        <a href="/">Calculate Another Fare</a>
      </div>

      {% else %}

      <form action="/fare" method="POST">
        <label>Customer Name</label>
        <input type="text" name="customer_name" required />

        <label>Distance Travelled (KM)</label>
        <input type="text" name="distance" required />

        <label>Fare per KM</label>
        <input type="text" name="fare_per_km" required />

        <br /><br />

        <button type="submit">Calculate Fare</button>
      </form>

      {% endif %}
    </div>
  </body>
</html>
