<!doctype html>
<html>
  <head>
    <title>Library Management Portal</title>

    <style>
      body {
        font-family: Arial;
        background-color: #f2f2f2;
        padding: 30px;
      }

      .container {
        width: 500px;
        background: white;
        margin: auto;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0px 0px 10px gray;
      }

      input {
        width: 95%;
        padding: 10px;
        margin: 8px 0;
      }

      button {
        background-color: darkred;
        color: white;
        border: none;
        padding: 10px 20px;
        cursor: pointer;
      }

      .result-box {
        background-color: #f9f9f9;
        padding: 15px;
        border-radius: 8px;
      }

      .fine {
        color: red;
        font-weight: bold;
        font-size: 20px;
      }

      h2,
      h3 {
        text-align: center;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h2>Library Fine Calculator</h2>

      {% if success %}

      <div class="result-box">
        <h3>Payment Summary</h3>

        <p><b>Student Name:</b> {{ student_name }}</p>
        <p><b>Book Name:</b> {{ book_name }}</p>

        <hr />

        <p><b>Days Late:</b> {{ days_late }}</p>

        <p class="fine">Fine Amount: ₹{{ fine_amount }}</p>

        <br />

        <a href="/">Calculate Another Fine</a>
      </div>

      {% else %}

      <form action="/fine" method="POST">
        <label>Student Name</label>
        <input type="text" name="student_name" required />

        <label>Book Name</label>
        <input type="text" name="book_name" required />

        <label>Days Late</label>
        <input type="text" name="days_late" required />

        <br /><br />

        <button type="submit">Calculate Fine</button>
      </form>

      {% endif %}
    </div>
  </body>
</html>
