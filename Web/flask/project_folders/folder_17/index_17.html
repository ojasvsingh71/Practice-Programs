<!doctype html>
<html>
  <head>
    <title>Grade Prediction System</title>

    <style>
      body {
        font-family: Arial;
        background-color: #f2f2f2;
        padding: 30px;
      }

      .container {
        width: 500px;
        background: white;
        margin: auto;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0px 0px 10px gray;
      }

      input {
        width: 95%;
        padding: 10px;
        margin: 8px 0;
      }

      button {
        background-color: darkblue;
        color: white;
        border: none;
        padding: 10px 20px;
        cursor: pointer;
      }

      .result-box {
        background-color: #f9f9f9;
        padding: 15px;
        border-radius: 8px;
      }

      .grade {
        font-size: 22px;
        font-weight: bold;
        color: green;
      }

      h2,
      h3 {
        text-align: center;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h2>Exam Grade Predictor</h2>

      {% if success %}

      <div class="result-box">
        <h3>Grade Prediction Result</h3>

        <p><b>Student Name:</b> {{ student_name }}</p>

        <hr />

        <p><b>Internal Marks:</b> {{ internal_marks }}</p>
        <p><b>External Marks:</b> {{ external_marks }}</p>

        <hr />

        <p><b>Total Marks:</b> {{ total_marks }}</p>

        <p class="grade">Grade: {{ grade }}</p>

        <br />

        <a href="/">Predict Another Grade</a>
      </div>

      {% else %}

      <form action="/grade" method="POST">
        <label>Student Name</label>
        <input type="text" name="student_name" required />

        <label>Internal Marks</label>
        <input type="text" name="internal_marks" required />

        <label>External Marks</label>
        <input type="text" name="external_marks" required />

        <br /><br />

        <button type="submit">Predict Grade</button>
      </form>

      {% endif %}
    </div>
  </body>
</html>
